name: Update cmux Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 0.63.2). Leave empty to auto-detect."
        required: false
        type: string
  schedule:
    - cron: "0 */12 * * *"

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: version_check
        run: |
          CURRENT_VERSION=$(grep 'version "' Casks/cmux.rb | sed 's/.*version "\(.*\)".*/\1/')
          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION="${{ inputs.version }}"
          else
            NEW_VERSION=$(curl -s https://api.github.com/repos/manaflow-ai/cmux/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$NEW_VERSION" ]; then
            echo "should_update=true" >> $GITHUB_OUTPUT
          else
            echo "should_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Download file and calculate checksum
        id: checksum
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.new_version }}"
          curl -f -L -o /tmp/cmux.dmg "https://github.com/manaflow-ai/cmux/releases/download/v${VERSION}/cmux-macos.dmg"
          SHA256=$(sha256sum /tmp/cmux.dmg | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update cask file
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.new_version }}"
          SHA256="${{ steps.checksum.outputs.sha256 }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/cmux.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/cmux.rb

      - name: Commit and push changes
        if: steps.version_check.outputs.should_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cmux.rb
          git commit -m "chore: update cmux to version ${{ steps.version_check.outputs.new_version }}"
          git push